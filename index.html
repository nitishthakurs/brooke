<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Brooke 💛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f6e58d, #f9ca24);
            transition: background 1.5s ease;
            cursor: default;
            min-height: 100vh;
        }
        .particles-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute; font-size: 22px; opacity: 0.7;
            animation: float 8s infinite ease-in-out;
            transition: transform 0.2s;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        .page {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 1;
            padding: 30px 20px;
            min-height: 100vh;
            position: relative;
            transform: translateY(20px);
        }
        .page.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transform: translateY(0);
        }
        .page-content {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #2d3436;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }
        @keyframes titleGlow {
            from { text-shadow: 2px 2px 0 rgba(255,255,255,0.5); }
            to { text-shadow: 0 0 20px #ffe066, 0 0 40px #f9ca24; }
        }
        h2 {
            font-size: 1.6rem;
            margin-bottom: 15px;
            color: #2d3436;
        }
        .btn {
            padding: 14px 32px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #f0932b, #e67e22);
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(240, 147, 43, 0.5);
            transition: all 0.3s;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 10px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn:hover::after { opacity: 1; }
        .btn:hover {
            transform: scale(1.07) translateY(-2px);
            box-shadow: 0 12px 28px rgba(240, 147, 43, 0.7);
            background: linear-gradient(135deg, #e67e22, #d35400);
        }
        .btn:active { transform: scale(0.98); }
        .australia-accent { font-size: 2.5rem; margin: 10px 0; animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Game */
        .game-stats {
            font-size: 1rem;
            margin: 15px 0;
            color: #2d3436;
            background: rgba(255,255,255,0.85);
            padding: 10px 25px;
            border-radius: 30px;
            display: inline-block;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 320px;
            margin: 15px auto;
        }
        .card {
            aspect-ratio: 1/1;
            perspective: 800px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.05); }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card.matched .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .card-front {
            background: linear-gradient(145deg, #ffeaa7, #fdcb6e);
            transform: rotateY(180deg);
        }
        .card-back {
            background: linear-gradient(145deg, #f0932b, #f9ca24);
            border: 3px solid rgba(255,255,255,0.5);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.2);
        }
        .card.matched .card-front {
            background: linear-gradient(145deg, #55efc4, #00b894);
            box-shadow: 0 0 25px rgba(85, 239, 196, 0.7);
            animation: matchPulse 0.5s ease;
        }
        @keyframes matchPulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        /* Letter */
        .letter-paper {
            background: linear-gradient(135deg, #fef9e7, #fff5e6);
            color: #2d3436;
            border-radius: 20px;
            padding: 20px;
            margin: 15px auto;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.5) inset;
            text-align: left;
            font-size: 1rem;
            line-height: 1.7;
            max-height: 50vh;
            overflow-y: auto;
            border: 2px solid #f9ca24;
            position: relative;
        }
        .letter-paper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 20%, rgba(249,202,36,0.1), transparent 50%);
            pointer-events: none;
            border-radius: 20px;
        }
        .typed-text {
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            border-right: 2px solid #e17055;
            display: inline;
            position: relative;
            z-index: 1;
        }

        /* Garden */
        .garden {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }
        .flower-bed {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #5a3e2b, #3e2723);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.6), 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            border: 2px dashed #8d6e63;
        }
        .flower-bed:hover {
            background: linear-gradient(135deg, #7b4f32, #5d4037);
            transform: scale(1.1);
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.6), 0 6px 20px rgba(0,0,0,0.4);
        }
        .flower-bed.bloomed {
            background: radial-gradient(circle, #fff9c4, #fff176);
            box-shadow: 0 0 25px rgba(255,241,118,0.8);
            cursor: default;
            border: 2px solid #f9ca24;
        }
        .flower-img { animation: bloom 0.8s ease forwards; font-size: 2.2rem; }
        @keyframes bloom {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        .affirmation {
            font-size: 1.1rem;
            margin-top: 15px;
            color: #2d3436;
            text-shadow: 0 0 10px #f9ca24;
            min-height: 2em;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Celebration */
        .celebration-text {
            font-size: 2rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite, rainbow 4s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        @keyframes rainbow {
            0% { color: #e74c3c; }
            25% { color: #f39c12; }
            50% { color: #2ecc71; }
            75% { color: #3498db; }
            100% { color: #e74c3c; }
        }
        .message-box {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.8) inset;
            line-height: 1.7;
            font-size: 1rem;
            color: #2d3436;
            margin: 15px auto;
            max-width: 500px;
            border: 2px solid rgba(249,202,36,0.3);
        }
        .signature { font-weight: bold; margin-top: 15px; font-size: 1.1rem; color: #e17055; }
        .stars { font-size: 1.8rem; margin-bottom: 10px; animation: starSpin 3s ease-in-out infinite; }
        @keyframes starSpin {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.1); }
        }

        /* Hug */
        .hug-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
            display: none;
            background: radial-gradient(circle, rgba(255,182,193,0.3), transparent 70%);
        }
        .arm-left, .arm-right {
            position: absolute;
            width: 100px;
            height: 140px;
            border: 8px solid #e17055;
            border-radius: 50%;
            top: 35%;
            box-shadow: 0 0 30px rgba(225,112,85,0.4);
        }
        .arm-left {
            left: -100px;
            border-right: none;
            border-bottom: none;
            transform: rotate(30deg);
            animation: hugLeft 1s ease forwards;
        }
        .arm-right {
            right: -100px;
            border-left: none;
            border-bottom: none;
            transform: rotate(-30deg);
            animation: hugRight 1s ease forwards;
        }
        @keyframes hugLeft {
            0% { left: -100px; }
            60% { left: 25%; }
            100% { left: 30%; opacity: 0.8; }
        }
        @keyframes hugRight {
            0% { right: -100px; }
            60% { right: 25%; }
            100% { right: 30%; opacity: 0.8; }
        }
        .hug-heart {
            position: absolute;
            top: 38%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 4rem;
            animation: heartPop 0.8s 0.4s ease forwards;
            filter: drop-shadow(0 0 20px #e17055);
        }
        @keyframes heartPop {
            0% { transform: translate(-50%, -50%) scale(0); }
            60% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        @media (max-width: 500px) {
            h1 { font-size: 1.8rem; }
            h2 { font-size: 1.4rem; }
            .btn { font-size: 1rem; padding: 12px 28px; }
            .memory-grid { gap: 8px; max-width: 280px; }
            .card-front, .card-back { font-size: 1.6rem; }
            .flower-bed { width: 55px; height: 55px; }
            .letter-paper { max-height: 45vh; padding: 15px; font-size: 0.9rem; }
            .celebration-text { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="particles-layer" id="particlesLayer"></div>

    <div class="page active" id="welcomePage">
        <div class="page-content">
            <h1>For Brooke, with love from Nitish 💛</h1>
            <p style="font-size:1.1rem; margin-bottom:25px;">A tiny spark of sunshine from across the world 🌏</p>
            <button class="btn" id="toGameBtn">Play a game first? 🎮</button>
            <div class="australia-accent">🐨🦘🌼</div>
        </div>
    </div>

    <div class="page" id="gamePage">
        <div class="page-content">
            <h2>🧩 Brooke's Matching Game</h2>
            <p style="color:#34495e; margin-bottom:10px;">Match the icons and get ahead</p>
            <div class="game-stats">
                <span>Moves: <span id="moveCounter">0</span></span>
                <span style="margin-left:15px;">Pairs: <span id="pairCounter">0</span>/8</span>
            </div>
            <div class="memory-grid" id="memoryGrid"></div>
            <button class="btn" style="margin-top:15px; font-size:0.95rem; padding:10px 25px;" id="restartGameBtn">🔄 Restart</button>
        </div>
    </div>

    <div class="page" id="letterPage">
        <div class="page-content">
            <h2>🕯️ A note for you</h2>
            <div class="letter-paper" id="letterContent"></div>
            <button class="btn" id="toGardenBtn" style="display:none;">🌸 Plant some flowers</button>
        </div>
    </div>

    <div class="page" id="gardenPage">
        <div class="page-content">
            <h2>🌱 Bloom for Brooke</h2>
            <p style="margin-bottom:15px;">Click each patch to plant a flower of love.</p>
            <div class="garden" id="garden"></div>
            <div class="affirmation" id="affirmation"></div>
            <button class="btn" id="toCelebrationBtn" style="display:none;">See your bouquet 🎉</button>
        </div>
    </div>

    <div class="page" id="celebrationPage">
        <canvas id="confetti-canvas"></canvas>
        <div class="page-content">
            <div class="stars" id="starRating"></div>
            <div class="celebration-text">Get well soon, Brooke! 💖</div>
            <div class="message-box" id="finalMessage"></div>
            <button class="btn" id="hugBtn">🤗 Send a virtual hug</button>
        </div>
    </div>

    <div class="hug-container" id="hugContainer">
        <div class="arm-left"></div>
        <div class="arm-right"></div>
        <div class="hug-heart">❤️</div>
    </div>

    <script>
        (function() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            let audioCtx;
            function ensureAudio() {
                if (!audioCtx) audioCtx = new AudioCtx();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }
            function playNote(freq, dur=0.2, vol=0.3) {
                if (!audioCtx) return;
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'sine'; o.frequency.value = freq;
                g.gain.setValueAtTime(vol, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                o.connect(g).connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + dur);
            }

            const particlesLayer = document.getElementById('particlesLayer');
            const emojis = ['💛', '🌼', '✨', '🐨', '🦘', '❤️', '🌟', '🌿', '🌸', '💖', '🎀', '🌺'];
            let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
            document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
            document.addEventListener('touchmove', e => { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; });
            
            function addParticle() {
                const p = document.createElement('span');
                p.className = 'particle';
                p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                p.style.left = Math.random() * 100 + '%';
                p.style.bottom = '-30px';
                p.style.animationDuration = (Math.random() * 6 + 6) + 's';
                p.style.fontSize = (Math.random() * 18 + 14) + 'px';
                particlesLayer.appendChild(p);
                const update = () => {
                    if (!p.parentNode) return;
                    const r = p.getBoundingClientRect();
                    const cx = r.left + r.width/2, cy = r.top + r.height/2;
                    const dx = mouseX - cx, dy = mouseY - cy, dist = Math.sqrt(dx*dx+dy*dy) || 1;
                    if (dist < 200) {
                        const force = (200 - dist) / 200 * 6;
                        p.style.transform = `translate(${dx/dist * force}px, ${dy/dist * force}px)`;
                    } else p.style.transform = '';
                    requestAnimationFrame(update);
                };
                requestAnimationFrame(update);
                setTimeout(() => p.remove(), 10000);
            }
            setInterval(addParticle, 700);
            for (let i = 0; i < 15; i++) addParticle();

            const pages = {
                welcome: document.getElementById('welcomePage'),
                game: document.getElementById('gamePage'),
                letter: document.getElementById('letterPage'),
                garden: document.getElementById('gardenPage'),
                celebration: document.getElementById('celebrationPage')
            };
            
            const backgrounds = {
                welcome: 'linear-gradient(135deg, #f6e58d, #f9ca24)',
                game: 'linear-gradient(135deg, #ffeaa7, #fdcb6e)',
                letter: 'linear-gradient(135deg, #fab1a0, #e17055)',
                garden: 'linear-gradient(to bottom, #a29bfe, #6c5ce7)',
                celebration: 'linear-gradient(135deg, #fbc2eb, #a6c1ee)'
            };
            
            function showPage(page) {
                Object.values(pages).forEach(p => p.classList.remove('active'));
                page.classList.add('active');
                window.scrollTo(0, 0);
                document.body.style.background = backgrounds[Object.keys(pages).find(key => pages[key] === page)] || backgrounds.welcome;
                if (page === pages.celebration) startConfetti();
                else stopConfetti();
            }

            const memoryGrid = document.getElementById('memoryGrid');
            const moveCounter = document.getElementById('moveCounter');
            const pairCounter = document.getElementById('pairCounter');
            const cardEmojis = ['🐨', '🦘', '❤️', '🩹', '🩺', '💊', '🌞', '🌿'];
            let cards = [], flippedCards = [], matchedPairs = 0, moves = 0, lockBoard = false;

            function shuffle(arr) {
                for (let i = arr.length-1; i>0; i--) {
                    const j = Math.floor(Math.random()*(i+1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }
            
            function initGame() {
                const doubled = [...cardEmojis, ...cardEmojis];
                const shuffled = shuffle(doubled);
                cards = shuffled.map((emoji, idx) => ({ id: idx, emoji, matched: false }));
                matchedPairs = 0; moves = 0; flippedCards = []; lockBoard = false;
                moveCounter.textContent = '0'; pairCounter.textContent = '0';
                renderCards();
            }
            
            function renderCards() {
                memoryGrid.innerHTML = '';
                cards.forEach(card => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    if (card.matched) div.classList.add('matched');
                    div.dataset.id = card.id;
                    div.innerHTML = `<div class="card-inner"><div class="card-front">${card.emoji}</div><div class="card-back"></div></div>`;
                    div.addEventListener('click', () => flipCard(div, card));
                    memoryGrid.appendChild(div);
                });
            }
            
            function flipCard(el, card) {
                if (lockBoard || card.matched || flippedCards.length===2 || flippedCards.includes(card.id)) return;
                playNote(600, 0.1, 0.2);
                el.classList.add('flipped');
                flippedCards.push(card.id);
                if (flippedCards.length === 2) {
                    moves++;
                    moveCounter.textContent = moves;
                    checkMatch();
                }
            }
            
            function checkMatch() {
                const [id1, id2] = flippedCards;
                const c1 = cards.find(c => c.id===id1);
                const c2 = cards.find(c => c.id===id2);
                if (c1.emoji === c2.emoji) {
                    c1.matched = c2.matched = true;
                    matchedPairs++;
                    pairCounter.textContent = matchedPairs;
                    flippedCards = [];
                    playNote(800, 0.2, 0.3);
                    document.querySelectorAll(`.card[data-id="${id1}"], .card[data-id="${id2}"]`).forEach(el => el.classList.add('matched'));
                    if (matchedPairs === cardEmojis.length) {
                        playNote(1000, 0.4, 0.5);
                        setTimeout(() => playNote(1200, 0.3, 0.4), 200);
                        setTimeout(() => playNote(1500, 0.5, 0.5), 400);
                        setTimeout(() => {
                            showPage(pages.letter);
                            typeLetter();
                        }, 900);
                    }
                } else {
                    lockBoard = true;
                    setTimeout(() => {
                        document.querySelectorAll(`.card[data-id="${id1}"], .card[data-id="${id2}"]`).forEach(el => el.classList.remove('flipped'));
                        flippedCards = [];
                        lockBoard = false;
                    }, 750);
                }
            }

            document.getElementById('toGameBtn').addEventListener('click', () => {
                ensureAudio();
                showPage(pages.game);
                initGame();
            });
            document.getElementById('restartGameBtn').addEventListener('click', initGame);

            function typeLetter() {
                const msg = "Hi Brooke,\n\nI just wanted to check in and see how you're doing.\n\nIt's strange, isn't it? The person who spends so much of her time making everyone else feel less worried, more comfortable, and a little more hopeful — is now the one who has to slow down. If the universe had any sense of fairness, it would be sending you all that comfort right back. And I hope it is.\n\nBut I also hope you're actually resting — not secretly trying to nurse your way through being sick like the stubborn human you are. You don't get bonus points for that, just so you know.\n\nThings aren't quite the same without you around. There are jokes going untold, eye-rolls I'm not getting, and a truly concerning lack of opportunities for me to annoy you. Honestly, I need you to recover soon — not just because I care, but because my bullying schedule is falling dangerously behind.\n\nSo give your body the time it needs. Let your mind rest too. Don't miss me too much (as always), and don't rush back before you're ready.\n\nI'll be here waiting for the day you're feeling better, back to your usual self, and fully capable of telling me to shut up again.\n\nSending the warmest hug,\nNitish 🌿";
                const el = document.getElementById('letterContent');
                el.innerHTML = '';
                let i = 0;
                const span = document.createElement('span');
                span.className = 'typed-text';
                el.appendChild(span);
                function type() {
                    if (i < msg.length) {
                        span.textContent += msg.charAt(i);
                        i++;
                        el.scrollTop = el.scrollHeight;
                        setTimeout(type, 35);
                    } else {
                        document.getElementById('toGardenBtn').style.display = 'inline-block';
                    }
                }
                type();
            }

            const words = ['Brave', 'Kind', 'Loved', 'Healing', 'Sunshine'];
            const flowerEmojis = ['🌷', '🌸', '🌼', '🌻', '🌺'];
            let bloomedCount = 0;

            document.getElementById('toGardenBtn').addEventListener('click', () => {
                showPage(pages.garden);
                buildGarden();
            });

            function buildGarden() {
                const gardenDiv = document.getElementById('garden');
                gardenDiv.innerHTML = '';
                bloomedCount = 0;
                document.getElementById('affirmation').textContent = '';
                document.getElementById('toCelebrationBtn').style.display = 'none';
                for (let i = 0; i < 5; i++) {
                    const bed = document.createElement('div');
                    bed.className = 'flower-bed';
                    bed.dataset.index = i;
                    bed.addEventListener('click', () => plantFlower(bed, i));
                    gardenDiv.appendChild(bed);
                }
            }

            function plantFlower(bed, idx) {
                if (bed.classList.contains('bloomed')) return;
                ensureAudio();
                const notes = [261.6, 293.7, 329.6, 349.2, 392.0];
                playNote(notes[idx], 0.4, 0.3);
                bed.classList.add('bloomed');
                bed.innerHTML = `<span class="flower-img">${flowerEmojis[idx]}</span>`;
                document.getElementById('affirmation').textContent = `"${words[idx]}"`;
                bloomedCount++;
                if (bloomedCount === 5) {
                    document.getElementById('affirmation').textContent = 'You make the world bloom, Brooke. 🌍💐';
                    document.getElementById('toCelebrationBtn').style.display = 'inline-block';
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => playNote(523 + i*100, 0.3, 0.4), i*150);
                    }
                }
            }

            document.getElementById('toCelebrationBtn').addEventListener('click', () => {
                showPage(pages.celebration);
                let stars = '';
                if (moves <= 12) stars = '⭐⭐⭐';
                else if (moves <= 18) stars = '⭐⭐';
                else stars = '⭐';
                document.getElementById('starRating').textContent = stars;
                document.getElementById('finalMessage').innerHTML = `
                    <p>You completed the game in <strong>${moves}</strong> moves — superstar! 🌟</p>
                    <p>Brooke, the world is a softer, kinder place because you're in it. Keep resting, keep shining.</p>
                    <p class="signature">All my love,<br>Nitish</p>
                `;
            });

            document.getElementById('hugBtn').addEventListener('click', () => {
                ensureAudio();
                playNote(523, 0.5, 0.5);
                setTimeout(() => playNote(659, 0.3, 0.4), 200);
                setTimeout(() => playNote(784, 0.4, 0.4), 400);
                const hug = document.getElementById('hugContainer');
                hug.style.display = 'block';
                setTimeout(() => hug.style.display = 'none', 2200);
            });

            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            let confettiParticles = [], confettiActive = false, animId;
            
            function resizeCanvas() { 
                canvas.width = window.innerWidth; 
                canvas.height = window.innerHeight; 
            }
            window.addEventListener('resize', resizeCanvas); 
            resizeCanvas();
            
            const confettiColors = [
                '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff',
                '#5f27cd', '#01a3a4', '#f368e0', '#ff6348', '#7bed9f',
                '#70a1ff', '#ffa502', '#2ed573', '#ff4757', '#eccc68'
            ];
            
            class Confetti {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height - canvas.height;
                    this.size = Math.random() * 10 + 5;
                    this.color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
                    this.speed = Math.random() * 4 + 2;
                    this.rot = Math.random() * 360;
                    this.rotSpd = Math.random() * 15 - 7;
                    this.wobble = Math.random() * 2 - 1;
                    this.shape = Math.random() > 0.5 ? 'rect' : 'circle';
                }
                update() {
                    this.y += this.speed;
                    this.rot += this.rotSpd;
                    this.x += this.wobble;
                    if (this.y > canvas.height + 30) { 
                        this.y = -30; 
                        this.x = Math.random() * canvas.width; 
                    }
                }
                draw() {
                    ctx.save(); 
                    ctx.translate(this.x, this.y); 
                    ctx.rotate(this.rot * Math.PI/180);
                    ctx.fillStyle = this.color;
                    if (this.shape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size/2, 0, Math.PI*2);
                        ctx.fill();
                    } else {
                        ctx.fillRect(-this.size/2, -this.size/3, this.size, this.size/1.5);
                    }
                    ctx.restore();
                }
            }
            
            function startConfetti() {
                if (confettiActive) return; 
                confettiActive = true;
                confettiParticles = Array.from({length: 200}, () => new Confetti());
                function loop() {
                    if (!confettiActive) return;
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    confettiParticles.forEach(p => { p.update(); p.draw(); });
                    animId = requestAnimationFrame(loop);
                }
                loop();
            }
            
            function stopConfetti() { 
                confettiActive = false; 
                if (animId) cancelAnimationFrame(animId); 
                ctx.clearRect(0,0,canvas.width,canvas.height); 
            }
        })();
    </script>
</body>
</html>
